name: Hello, World!
description: Greet someone and record the time
author: GitHub Actions

# Define your inputs here.
inputs:
  who-to-greet:
    description: Who to greet
    required: true
    default: World
  github-token:
    description: Token used by the demo write-back behavior
    required: false
    default: ${{ github.token }}
  demo-dependency-group-id:
    description: Maven groupId that the side-effect demo adds to pom.xml
    required: false
    default: org.apache.commons
  demo-dependency-artifact-id:
    description: Maven artifactId that the side-effect demo adds to pom.xml
    required: false
    default: commons-lang3
  demo-dependency-version:
    description:
      Maven dependency version that the side-effect demo adds to pom.xml
    required: false
    default: 3.17.0
  demo-commit-message:
    description: Commit message used by the write-back demo when enabled
    required: false
    default: 'demo(action): add Maven dependency from third-party action'

# Define your outputs here.
outputs:
  time:
    description: The time we greeted you

runs:
  using: node24
  main: dist/index.js
